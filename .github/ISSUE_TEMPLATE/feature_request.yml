name: Feature request
description: Suggest a product improvement or new diagnosis capability
labels: ["enhancement"]
body:
  - type: input
    id: problem
    attributes:
      label: Problem statement
      placeholder: What user pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: What behavior or output should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      placeholder: Who benefits, and how will we measure success?
