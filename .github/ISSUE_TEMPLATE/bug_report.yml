name: Bug report
description: Report a reproducible bug in whyslow
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce and triage quickly.
  - type: input
    id: version
    attributes:
      label: whyslow version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      placeholder: whyslow --duration 20 --json
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      render: shell
